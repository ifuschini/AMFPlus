name: Build

on:
  push:
  pull_request:

jobs:
  apache-module:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        curl_support: [enabled, disabled]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y apache2-dev libcurl4-openssl-dev

      - name: Compile mod_amf
        run: |
          APXS="$(command -v apxs || command -v apxs2)"
          if [ "${{ matrix.curl_support }}" = "enabled" ]; then
            "$APXS" -c -Wc,-Wall mod_amf.c -lcurl
          else
            "$APXS" -c -Wc,-Wall -Wc,-DAMF_NO_CURL_SUPPORT mod_amf.c
          fi
