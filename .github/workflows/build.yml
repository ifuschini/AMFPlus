name: Build

on:
  push:
  pull_request:

jobs:
  apache-module:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y apache2-dev libcurl4-openssl-dev

      - name: Compile mod_amf
        run: |
          APXS="$(command -v apxs || command -v apxs2)"
          "$APXS" -c -Wc,-Wall mod_amf.c -lcurl
